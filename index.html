<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servidores Free Fire</title>
<link rel="stylesheet" href="css/style.css">


</head>
<body>

<h1>Servidores de contas free fire</h1>

<div class="lista-servidores" id="listaServidores">

  <!-- Card especial de Adicionar Servidor -->
  <div class="adicionar-servidor" id="adicionarServidorCard">
    <span> Adicionar Servidor</span>
    <div class="form-adicionar" id="formAdicionar">
      <input type="text" id="nomeServidor" placeholder="Nome do servidor">
      <input type="text" id="descServidor" placeholder="Descrição do servidor">
      <input type="url" id="linkServidor" placeholder="Link do Discord">
      <input type="file" id="imgServidor" accept="image/*">
      <button id="btnAdicionarServidor">Adicionar Servidor</button>
    </div>
  </div>

  <!-- Servidores existentes -->
  <div class="servidor">
    <img src="laranja.webp" alt="Servidor 1">
    <div class="servidor-info">
      <h2>laranja vendas</h2>
      <p>Vendas Free Fire rápidas e seguras</p>
    </div>
    <button class="btn-entrar" onclick="window.open('https://discord.gg/jh6nNaGE','_blank')">Entrar</button>
  </div>

</div>

<script src="java.js">
 
</script>

</body>
</html>








</body>
</html>
